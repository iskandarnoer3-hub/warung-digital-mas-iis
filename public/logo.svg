<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#F9A8D4;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#8B5CF6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="#09090b" stroke="url(#logoGrad)" stroke-width="2.5"/>
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#innerGlow)"/>
  
  <!-- M letter - clean and bold -->
  <g filter="url(#glow)">
    <path d="M20 84V36L36 62L52 36V84" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- I letter - with decorative dot -->
  <g filter="url(#glow)">
    <line x1="76" y1="36" x2="76" y2="72" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="76" cy="82" r="4" fill="url(#logoGrad)"/>
  </g>
  
  <!-- Decorative separator -->
  <circle cx="62" cy="52" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="62" cy="60" r="1.5" fill="#D8B4FE" opacity="0.35"/>
  <circle cx="62" cy="67" r="1" fill="#F0ABFC" opacity="0.25"/>
  
  <!-- Subtle accent dots -->
  <circle cx="96" cy="30" r="1.5" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="102" cy="24" r="1" fill="#F9A8D4" opacity="0.3"/>
  <circle cx="92" cy="90" r="1" fill="#C4B5FD" opacity="0.2"/>
</svg>